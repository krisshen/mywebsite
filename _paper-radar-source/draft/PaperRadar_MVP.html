<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperRadar · 今日 AI 论文精选</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a1a;
  --ink-light: #555;
  --ink-faint: #999;
  --paper: #faf8f4;
  --paper-warm: #f3f0ea;
  --line: #e0dbd0;
  --accent: #c0392b;
  --font-body: 'Lora', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.masthead {
  border-bottom: 3px double var(--ink);
  padding: 28px 40px 20px;
  text-align: center;
}
.masthead-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 10px;
}
.masthead-title {
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
}
.masthead-title span { color: var(--accent); }
.masthead-sub {
  margin-top: 10px;
  font-size: 0.85rem;
  color: var(--ink-light);
  font-style: italic;
}
.masthead-date {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--ink-faint);
  margin-top: 14px;
  letter-spacing: 0.1em;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.section-label {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 32px 0 20px;
}
.section-label::before,
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}
.section-label span {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  white-space: nowrap;
}

.paper {
  border: 1px solid var(--line);
  background: #fff;
  margin-bottom: 20px;
  transition: box-shadow 0.2s, transform 0.2s;
  animation: slideIn 0.4s ease both;
}
.paper:hover {
  box-shadow: 4px 4px 0 var(--line);
  transform: translate(-2px, -2px);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.paper:nth-child(1) { animation-delay: 0.05s; }
.paper:nth-child(2) { animation-delay: 0.15s; }
.paper:nth-child(3) { animation-delay: 0.25s; }
.paper:nth-child(4) { animation-delay: 0.35s; }
.paper:nth-child(5) { animation-delay: 0.45s; }

.paper-header {
  padding: 24px 28px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.paper-num {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: 500;
  color: var(--line);
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
}
.paper-meta { flex: 1; }
.paper-title {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 8px;
  color: var(--ink);
}
.paper-authors {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--ink-faint);
}
.paper-stars {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  flex-shrink: 0;
  color: var(--accent);
  letter-spacing: 2px;
  margin-top: 2px;
}

.switcher-row {
  padding: 13px 28px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}
.switcher-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  white-space: nowrap;
}
.switcher {
  display: flex;
  border: 1px solid var(--line);
}
.diff-btn {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 14px;
  background: transparent;
  color: var(--ink-light);
  border: none;
  border-right: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.diff-btn:last-child { border-right: none; }
.diff-btn:hover { background: var(--paper-warm); color: var(--ink); }
.diff-btn.active { background: var(--ink); color: var(--paper); }

.paper-body {
  padding: 22px 28px 20px;
  border-bottom: 1px solid var(--line);
  min-height: 100px;
}
.summary-text {
  font-size: 0.95rem;
  line-height: 1.85;
  color: var(--ink);
  transition: opacity 0.18s ease;
}
.summary-text.fade { opacity: 0; }

.paper-footer {
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.arxiv-link {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.15s;
}
.arxiv-link:before { content: '\2197  '; }
.arxiv-link:hover { color: var(--accent); }
.rec-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 10px;
  border: 1px solid var(--line);
  color: var(--ink-faint);
  letter-spacing: 0.06em;
}

.site-footer {
  border-top: 1px solid var(--line);
  padding: 24px 40px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
}

@media (max-width: 600px) {
  .masthead { padding: 20px 16px 16px; }
  .container { padding: 0 16px 60px; }
  .paper-header { padding: 18px 18px 14px; flex-wrap: wrap; }
  .paper-num { font-size: 1.2rem; }
  .switcher-row { padding: 12px 18px; flex-wrap: wrap; }
  .paper-body { padding: 18px 18px 16px; }
  .paper-footer { padding: 10px 18px; }
}
</style>
</head>

  card.className = 'paper';

  var header = document.createElement('div');
  header.className = 'paper-header';
  header.innerHTML =
    '<div class="paper-num">' + numStr(idx) + '</div>' +
    '<div class="paper-meta">' +
      '<div class="paper-title"></div>' +
      '<div class="paper-authors"></div>' +
    '</div>' +
    '<div class="paper-stars"></div>';
  header.querySelector('.paper-title').textContent = p.title;
  header.querySelector('.paper-authors').textContent = p.authors;
  header.querySelector('.paper-stars').textContent = stars(p.stars);
  header.querySelector('.paper-stars').title = p.stars + '/5';

  var swRow = document.createElement('div');
  swRow.className = 'switcher-row';
  swRow.innerHTML = '<span class="switcher-label">\u9605\u8bfb\u96be\u5ea6</span><div class="switcher"></div>';
  var sw = swRow.querySelector('.switcher');
  [['expert', '\u4e13\u4e1a\u7248'], ['general', '\u901a\u7528\u7248'], ['lazy', '\u61d2\u4eba\u7248']].forEach(function(pair) {
    var btn = document.createElement('button');
    btn.className = 'diff-btn' + (pair[0] === 'lazy' ? ' active' : '');
    btn.textContent = pair[1];
    btn.addEventListener('click', function() { switchLevel(sw, p, idx, pair[0]); });
    sw.appendChild(btn);
  });

  var body = document.createElement('div');
  body.className = 'paper-body';
  var sumEl = document.createElement('div');
  sumEl.className = 'summary-text';
  sumEl.id = 'sum' + idx;
  sumEl.textContent = p.lazy;
  body.appendChild(sumEl);

  var footer = document.createElement('div');
  footer.className = 'paper-footer';
  var link = document.createElement('a');
  link.className = 'arxiv-link';
  link.href = 'https://arxiv.org/abs/' + p.arxiv_id;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = 'arxiv.org/abs/' + p.arxiv_id;
  var badge = document.createElement('span');
  badge.className = 'rec-badge';
  badge.textContent = '\u63a8\u8350\u6307\u6570 ' + p.stars + '/5';
  footer.appendChild(link);
  footer.appendChild(badge);

  card.appendChild(header);
  card.appendChild(swRow);
  card.appendChild(body);
  card.appendChild(footer);
  return card;
}

function switchLevel(sw, p, idx, level) {
  sw.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
  sw.querySelectorAll('.diff-btn').forEach(function(b) {
    if ((level === 'expert' && b.textContent === '\u4e13\u4e1a\u7248') ||
        (level === 'general' && b.textContent === '\u901a\u7528\u7248') ||
        (level === 'lazy' && b.textContent === '\u61d2\u4eba\u7248')) {
      b.classList.add('active');
    }
  });
  var el = document.getElementById('sum' + idx);
  el.classList.add('fade');
  var text = level === 'expert' ? p.expert : level === 'general' ? p.general : p.lazy;
  setTimeout(function() {
    el.textContent = text;
    el.classList.remove('fade');
  }, 180);
}

function init() {
  var list = document.getElementById('papers-list');
  PAPERS.forEach(function(p, i) { list.appendChild(buildCard(p, i)); });

  var d = new Date();
  document.getElementById('today-date').textContent =
    d.getFullYear() + ' \u5e74 ' + (d.getMonth() + 1) + ' \u6708 ' + d.getDate() + ' \u65e5';
}

init();
</script>
</body>
</html>
